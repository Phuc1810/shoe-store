<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Đơn Hàng - Hệ Thống Quản Lý Cửa Hàng Giày</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome để hiển thị icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <style>
        body {
            background-color: #f4f7f6;
        }
        .status-badge {
            padding: 0.5rem 0.75rem;
            border-radius: 0.25rem;
            font-size: 0.875rem;
            font-weight: 500;
            display: inline-block;
            text-transform: capitalize;
        }
        /* CSS động cho các trạng thái */
        .status-confirmed { background-color: #e7f5ff; color: #1971c2; }
        .status-shipping { background-color: #fff3cd; color: #856404; }
        .status-delivered { background-color: #d4edda; color: #155724; }
        .status-cancelled { background-color: #f8d7da; color: #721c24; }

        .order-code {
            font-weight: 600;
            color: #0c5460;
        }
        .customer-info {
            max-width: 250px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .search-form {
            background-color: #ffffff;
            padding: 1.5rem;
            border-radius: 0.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }
        .table-hover tbody tr:hover {
            background-color: #f8f9fa;
        }
        .page-header {
            padding-bottom: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #dee2e6;
        }
    </style>
</head>
<body>

<div class="container-fluid pt-4">
    <div class="row">
        <!-- Sidebar -->
        <div th:replace="~{layout/sidebar :: sidebar}"></div>

        <!-- Nội dung chính -->
        <div class="col-md-10">
            <!-- Header Trang -->
            <div class="page-header d-flex justify-content-between align-items-center">
                <h1 class="h3 mb-0 text-gray-800">Quản Lý Đơn Hàng</h1>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item"><a href="/admin">Admin</a></li>
                        <li class="breadcrumb-item active">Đơn hàng</li>
                    </ol>
                </nav>
            </div>

            <!-- Thông báo lỗi/thành công -->
            <div th:if="${message}" th:class="'alert alert-' + ${alertType ?: 'info'} + ' alert-dismissible fade show'" role="alert">
                <i class="fas fa-info-circle me-2"></i>
                <span th:text="${message}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="fas fa-exclamation-triangle me-2"></i>
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Form Tìm Kiếm -->
            <div class="search-form">
                <form method="get" class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Mã Đơn Hàng</label>
                        <input type="text" class="form-control" name="orderCode"
                               th:value="${orderCode}" placeholder="Ví dụ: ORD123">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Tên Khách Hàng</label>
                        <input type="text" class="form-control" name="customerName"
                               th:value="${customerName}" placeholder="Nhập tên khách hàng">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Trạng Thái</label>
                        <select class="form-select" name="status">
                            <option value="">-- Tất Cả --</option>
                            <option th:each="s : ${statuses}" th:value="${s}"
                                    th:text="${s}" th:selected="${status == s}"></option>
                        </select>
                    </div>
                    <div class="col-md-3 d-flex align-items-end gap-2">
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-search me-1"></i> Lọc
                        </button>
                        <a href="/admin/orders" class="btn btn-outline-secondary w-100">
                            <i class="fas fa-redo me-1"></i> Reset
                        </a>
                    </div>
                </form>
            </div>

            <!-- Bảng Danh Sách -->
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                    <h6 class="m-0 font-weight-bold text-primary"><i class="fas fa-table me-2"></i>Danh Sách Đơn Hàng</h6>
                    <span class="badge bg-primary rounded-pill" th:text="'Tổng: ' + ${orders.totalElements}"></span>
                </div>
                <div class="card-body p-0">
                    <div th:if="${orders.empty}" class="p-4 text-center">
                        <img src="https://cdn-icons-png.flaticon.com/512/7486/7486744.png" width="80" class="mb-3 opacity-50">
                        <p class="text-muted">Không có đơn hàng nào khớp với tìm kiếm.</p>
                    </div>

                    <div th:if="!${orders.empty}" class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                            <tr>
                                <th class="ps-3">#</th>
                                <th>Mã Đơn</th>
                                <th>Khách Hàng</th>
                                <th>Tổng Tiền</th>
                                <th>Thanh Toán</th>
                                <th>Trạng Thái</th>
                                <th>Ngày Tạo</th>
                                <th class="text-center">Hành Động</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="order, iter : ${orders.content}">
                                <td class="ps-3" th:text="${iter.count + (orders.number * orders.size)}"></td>
                                <td><span class="order-code" th:text="${order.orderCode}"></span></td>
                                <td>
                                    <div class="customer-info">
                                        <div class="fw-bold" th:text="${order.receiverName}"></div>
                                        <small class="text-muted"><i class="fas fa-phone fa-xs"></i> [[${order.receiverPhone}]]</small>
                                    </div>
                                </td>
                                <td class="fw-bold text-danger" th:text="${#numbers.formatInteger(order.finalAmount, 1, 'POINT') + ' ₫'}"></td>
                                <td>
                                    <small class="badge border text-dark fw-normal" th:text="${order.paymentMethod}"></small>
                                </td>
                                <td>
                                        <span th:class="'status-badge status-' + ${#strings.toLowerCase(order.orderStatus)}"
                                              th:text="${order.orderStatus}"></span>
                                </td>
                                <!-- ĐÃ SỬA LỖI #temporals TẠI ĐÂY -->
                                <td th:text="${order.createdAt != null ? #temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm') : '-'}"></td>
                                <td class="text-center">
                                    <a th:href="@{/admin/orders/{id}(id=${order.id})}" class="btn btn-sm btn-outline-primary">
                                        <i class="fas fa-eye"></i> Chi tiết
                                    </a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Phân Trang -->
            <nav th:if="${orders.totalPages > 1}" class="mt-4">
                <ul class="pagination justify-content-center">
                    <li th:class="${orders.first} ? 'page-item disabled' : 'page-item'">
                        <a class="page-link" th:href="@{/admin/orders(page=0, orderCode=${orderCode}, customerName=${customerName}, status=${status})}">
                            <i class="fas fa-angle-double-left"></i>
                        </a>
                    </li>
                    <li th:each="pageNum : ${#numbers.sequence(0, orders.totalPages - 1)}"
                        th:class="${orders.number == pageNum} ? 'page-item active' : 'page-item'">
                        <a class="page-link" th:href="@{/admin/orders(page=${pageNum}, orderCode=${orderCode}, customerName=${customerName}, status=${status})}"
                           th:text="${pageNum + 1}"></a>
                    </li>
                    <li th:class="${orders.last} ? 'page-item disabled' : 'page-item'">
                        <a class="page-link" th:href="@{/admin/orders(page=${orders.totalPages - 1}, orderCode=${orderCode}, customerName=${customerName}, status=${status})}">
                            <i class="fas fa-angle-double-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

<!--<div th:replace="~{layout/footer :: footer}"></div>-->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
