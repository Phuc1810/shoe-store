<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${isEdit ? 'Sửa sản phẩm' : 'Thêm sản phẩm mới'} + ' - Shoe Store Admin'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="d-flex min-vh-100">
    <!-- Sidebar -->
    <aside th:replace="~{layout/sidebar :: sidebar}"></aside>

    <!-- Main Content -->
    <main class="flex-grow-1 p-4">
        <div class="container-fluid">
            <!-- Header -->
            <div class="row mb-4">
                <div class="col-12">
                    <h2>
                        <i class="bi bi-shoe"></i> 
                        <span th:text="${isEdit ? 'Sửa sản phẩm' : 'Thêm sản phẩm mới'}"></span>
                    </h2>
                </div>
            </div>

            <!-- Form Card -->
            <div class="card">
                <div class="card-body">
                    <form th:action="@{/admin/products${isEdit ? '/' + productId : ''}}" 
                          method="post" 
                          th:object="${product}"
                          class="form-horizontal">
                        
                        <!-- Hidden field cho PUT method (khi sửa) -->
                        <input type="hidden" name="_method" value="PUT" th:if="${isEdit}">

                        <!-- Product Name -->
                        <div class="mb-3">
                            <label for="name" class="form-label">Tên sản phẩm <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="name" th:field="*{name}"
                                   placeholder="Nhập tên sản phẩm"
                                   th:classappend="${#fields.hasErrors('name') ? 'is-invalid' : ''}">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}">
                                <span th:errors="*{name}"></span>
                            </div>
                        </div>

                        <!-- Category -->
                        <div class="mb-3">
                            <label for="categoryId" class="form-label">Danh mục <span class="text-danger">*</span></label>
                            <select class="form-select" id="categoryId" th:field="*{categoryId}"
                                    th:classappend="${#fields.hasErrors('categoryId') ? 'is-invalid' : ''}">
                                <option value="">-- Chọn danh mục --</option>
                                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('categoryId')}">
                                <span th:errors="*{categoryId}"></span>
                            </div>
                        </div>

                        <!-- Brand -->
                        <div class="mb-3">
                            <label for="brandId" class="form-label">Thương hiệu</label>
                            <select class="form-select" id="brandId" th:field="*{brandId}">
                                <option value="">-- Chọn thương hiệu --</option>
                                <option th:each="brand : ${brands}" th:value="${brand.id}" th:text="${brand.name}"></option>
                            </select>
                        </div>

                        <!-- Gender -->
                        <div class="mb-3">
                            <label for="gender" class="form-label">Giới tính <span class="text-danger">*</span></label>
                            <select class="form-select" id="gender" th:field="*{gender}"
                                    th:classappend="${#fields.hasErrors('gender') ? 'is-invalid' : ''}">
                                <option value="">-- Chọn giới tính --</option>
                                <option th:each="gender : ${genders}" th:value="${gender}" th:text="${gender}"></option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('gender')}">
                                <span th:errors="*{gender}"></span>
                            </div>
                        </div>

                        <!-- Short Description -->
                        <div class="mb-3">
                            <label for="shortDescription" class="form-label">Mô tả ngắn</label>
                            <input type="text" class="form-control" id="shortDescription" th:field="*{shortDescription}"
                                   placeholder="Mô tả ngắn sản phẩm (tối đa 255 ký tự)"
                                   th:classappend="${#fields.hasErrors('shortDescription') ? 'is-invalid' : ''}">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('shortDescription')}">
                                <span th:errors="*{shortDescription}"></span>
                            </div>
                        </div>

                        <!-- Description -->
                        <div class="mb-3">
                            <label for="description" class="form-label">Mô tả chi tiết</label>
                            <textarea class="form-control" id="description" th:field="*{description}"
                                      rows="5" placeholder="Nhập mô tả chi tiết sản phẩm"></textarea>
                        </div>

                        <!-- Base Price -->
                        <div class="mb-3">
                            <label for="basePrice" class="form-label">Giá (VND) <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="basePrice" th:field="*{basePrice}"
                                   step="0.01" min="0.01" placeholder="Nhập giá sản phẩm"
                                   th:classappend="${#fields.hasErrors('basePrice') ? 'is-invalid' : ''}">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('basePrice')}">
                                <span th:errors="*{basePrice}"></span>
                            </div>
                        </div>

                        <!-- Status -->
                        <div class="mb-3">
                            <label for="status" class="form-label">Trạng thái <span class="text-danger">*</span></label>
                            <select class="form-select" id="status" th:field="*{status}"
                                    th:classappend="${#fields.hasErrors('status') ? 'is-invalid' : ''}">
                                <option value="">-- Chọn trạng thái --</option>
                                <option th:each="s : ${statuses}" th:value="${s}" 
                                        th:text="${s == 'ACTIVE' ? 'Hoạt động' : 'Vô hiệu hóa'}"></option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('status')}">
                                <span th:errors="*{status}"></span>
                            </div>
                        </div>

                        <!-- Form Actions -->
                        <div class="mb-0">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle"></i>
                                <span th:text="${isEdit ? 'Cập nhật' : 'Thêm mới'}"></span>
                            </button>
                            <a href="/admin/products" class="btn btn-secondary">
                                <i class="bi bi-x-circle"></i> Hủy
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Hỗ trợ PUT method cho Thymeleaf form
    document.addEventListener('DOMContentLoaded', function() {
        const forms = document.querySelectorAll('form');
        forms.forEach(form => {
            if (form.innerHTML.includes('name="_method"')) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    
                    // Lấy method từ hidden input
                    const methodInput = this.querySelector('input[name="_method"]');
                    if (methodInput) {
                        const originalAction = this.action;
                        const formData = new FormData(this);
                        const method = methodInput.value;
                        
                        // Gửi request PUT thay vì POST
                        fetch(originalAction, {
                            method: method,
                            body: formData
                        }).then(response => {
                            if (response.ok) {
                                window.location.href = '/admin/products';
                            }
                        }).catch(error => console.error('Error:', error));
                    }
                });
            }
        });
    });
</script>
</body>
</html>
