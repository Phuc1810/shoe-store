<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quản lý sản phẩm - Shoe Store Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="d-flex min-vh-100">
    <!-- Sidebar -->
    <aside th:replace="~{layout/sidebar :: sidebar}"></aside>

    <!-- Main Content -->
    <main class="flex-grow-1 p-4">
        <div class="container-fluid">
            <!-- Header -->
            <div class="row mb-4">
                <div class="col-12">
                    <div class="d-flex justify-content-between align-items-center">
                        <h2><i class="bi bi-shoe"></i> Quản lý Sản phẩm</h2>
                        <a href="/admin/products/add" class="btn btn-primary">
                            <i class="bi bi-plus-circle"></i> Thêm sản phẩm mới
                        </a>
                    </div>
                </div>
            </div>

            <!-- Alert Messages -->
            <div th:if="${message}" class="alert alert-dismissible fade show" 
                 th:classappend="'alert-' + ${alertType}" role="alert">
                <span th:text="${message}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Search & Filter Form -->
            <div class="card mb-4">
                <div class="card-header">
                    <h5 class="mb-0">Tìm kiếm & Lọc</h5>
                </div>
                <div class="card-body">
                    <form method="get" th:action="@{/admin/products}" class="row g-3">
                        <div class="col-md-3">
                            <input type="text" name="name" class="form-control" 
                                   placeholder="Tên sản phẩm..." th:value="${name}">
                        </div>
                        <div class="col-md-3">
                            <select name="categoryId" class="form-select">
                                <option value="">-- Chọn danh mục --</option>
                                <option th:each="cat : ${categories}" 
                                        th:value="${cat.id}" 
                                        th:text="${cat.name}"
                                        th:selected="${categoryId == cat.id}"></option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <select name="brandId" class="form-select">
                                <option value="">-- Chọn thương hiệu --</option>
                                <option th:each="brand : ${brands}" 
                                        th:value="${brand.id}" 
                                        th:text="${brand.name}"
                                        th:selected="${brandId == brand.id}"></option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <select name="status" class="form-select">
                                <option value="">-- Trạng thái --</option>
                                <option value="ACTIVE" th:selected="${status == 'ACTIVE'}">Hoạt động</option>
                                <option value="INACTIVE" th:selected="${status == 'INACTIVE'}">Vô hiệu hóa</option>
                            </select>
                        </div>
                        <div class="col-md-1">
                            <button type="submit" class="btn btn-success w-100">
                                <i class="bi bi-search"></i> Tìm
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Products Table -->
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">
                        Danh sách sản phẩm 
                        <span class="badge bg-info" th:text="'Tổng: ' + ${products.totalElements}"></span>
                    </h5>
                </div>
                <div class="card-body p-0">
                    <div th:if="${products.isEmpty()}" class="p-4 text-center">
                        <p class="text-muted">Không có sản phẩm nào.</p>
                    </div>
                    
                    <table th:unless="${products.isEmpty()}" class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Tên sản phẩm</th>
                                <th>Danh mục</th>
                                <th>Thương hiệu</th>
                                <th>Giá</th>
                                <th>Trạng thái</th>
                                <th class="text-center">Hành động</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="product, iterStat : ${products.content}">
                                <td th:text="${(products.number * products.size) + iterStat.count}"></td>
                                <td>
                                    <strong th:text="${product.name}"></strong>
                                </td>
                                <td th:text="${product.categoryName}"></td>
                                <td th:text="${product.brandName ?: 'N/A'}"></td>
                                <td>
                                    <span class="badge bg-success" th:text="${#numbers.formatDecimal(product.basePrice, 1, 2)}"></span>
                                </td>
                                <td>
                                    <span class="badge" 
                                          th:classappend="${product.status == 'ACTIVE' ? 'bg-success' : 'bg-danger'}"
                                          th:text="${product.status == 'ACTIVE' ? 'Hoạt động' : 'Vô hiệu hóa'}">
                                    </span>
                                </td>
                                <td class="text-center">
                                    <div class="btn-group btn-group-sm" role="group">
                                        <a th:href="@{/admin/products/{id}/edit(id=${product.id})}" 
                                           class="btn btn-warning" title="Sửa">
                                            <i class="bi bi-pencil"></i> Sửa
                                        </a>
                                        <a th:href="@{/admin/products/{id}(id=${product.id})}" 
                                           class="btn btn-info" title="Chi tiết">
                                            <i class="bi bi-eye"></i> Xem
                                        </a>
                                        <button type="button" class="btn btn-danger" title="Xóa"
                                                onclick="confirmDelete([[${product.id}]])">
                                            <i class="bi bi-trash"></i> Xóa
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Pagination -->
            <nav th:if="${products.totalPages > 1}" class="mt-4" aria-label="Page navigation">
                <ul class="pagination justify-content-center">
                    <!-- Previous Page -->
                    <li class="page-item" th:classappend="${!products.hasPrevious() ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/admin/products(page=${products.number - 1},name=${name},categoryId=${categoryId},brandId=${brandId},status=${status})}"
                           th:text="'← Trước'"></a>
                    </li>

                    <!-- Page Numbers -->
                    <li th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}" 
                        class="page-item" 
                        th:classappend="${i == products.number ? 'active' : ''}">
                        <a class="page-link" 
                           th:href="@{/admin/products(page=${i},name=${name},categoryId=${categoryId},brandId=${brandId},status=${status})}"
                           th:text="${i + 1}"></a>
                    </li>

                    <!-- Next Page -->
                    <li class="page-item" th:classappend="${!products.hasNext() ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/admin/products(page=${products.number + 1},name=${name},categoryId=${categoryId},brandId=${brandId},status=${status})}"
                           th:text="'Sau →'"></a>
                    </li>
                </ul>
            </nav>
        </div>
    </main>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Xác nhận xóa</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>Bạn có chắc chắn muốn xóa sản phẩm này? Hành động này không thể hoàn tác.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                <form id="deleteForm" method="post" action="" style="display: inline;">
                    <input type="hidden" name="_method" value="DELETE">
                    <button type="submit" class="btn btn-danger">Xóa</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin/product.js}"></script>

<script>
    // Hàm xác nhận xóa sản phẩm
    function confirmDelete(productId) {
        const modal = new bootstrap.Modal(document.getElementById('deleteModal'));
        const deleteForm = document.getElementById('deleteForm');
        deleteForm.action = '/admin/products/' + productId;
        modal.show();
    }
</script>
</body>
</html>
