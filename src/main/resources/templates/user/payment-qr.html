<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Thanh toán QR - Shoe Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/user.css}">
</head>
<body class="home-page">
<header th:replace="~{layout/header :: userHeader}"></header>

<main class="order-page">
    <section class="container order-shell">
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}">
            Có lỗi xảy ra
        </div>

        <div class="payment-qr-card">
            <h1>Thanh toán bằng QR ngân hàng</h1>
            <p>Vui lòng chuyển khoản đúng nội dung để hệ thống demo xác nhận đơn hàng.</p>

            <img class="payment-qr-image" th:src="@{/images/payment/bank-qr.png}" alt="QR ngân hàng">

            <div class="payment-qr-info">
                <div>
                    <span>Mã đơn hàng</span>
                    <strong th:text="${order.orderCode}">ORD</strong>
                </div>
                <div>
                    <span>Số tiền cần thanh toán</span>
                    <strong th:text="${#numbers.formatDecimal(order.finalAmount, 0, 'POINT', 0, 'COMMA') + ' đ'}">
                        0 đ
                    </strong>
                </div>
                <div>
                    <span>Nội dung chuyển khoản</span>
                    <strong th:text="${order.orderCode}">ORD</strong>
                </div>
            </div>

            <p class="payment-qr-note">
                Sau khi chuyển khoản, bấm nút xác nhận đã thanh toán.
            </p>

            <form th:action="@{/orders/{orderId}/confirm-payment(orderId=${order.orderId})}" method="post">
                <button type="submit" class="btn btn-primary btn-lg">Tôi đã thanh toán</button>
            </form>
        </div>
    </section>
</main>

<footer th:replace="~{layout/footer :: userFooter}"></footer>

<script th:src="@{/js/user/home.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
