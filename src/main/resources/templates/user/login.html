<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng nhập - Shoe Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/user.css}">
</head>
<body class="home-page">
<header th:replace="~{layout/header :: userHeader}"></header>

<main class="order-page">
    <section class="container order-shell">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">
                <div class="checkout-card login-card">
                    <div class="text-center mb-4">
                        <h1 class="h3 fw-bold mb-2">Đăng nhập</h1>
                        <p class="text-muted mb-0">Tiếp tục mua sắm và quản lý đơn hàng của bạn.</p>
                    </div>

                    <div th:if="${param.registered}" class="alert alert-success">
                        Đăng ký thành công. Vui lòng đăng nhập.
                    </div>

                    <div th:if="${param.error}" class="alert alert-danger">
                        Tên đăng nhập hoặc mật khẩu không đúng
                    </div>

                    <div th:if="${param.logout}" class="alert alert-success">
                        Bạn đã đăng xuất thành công
                    </div>

                    <form th:action="@{/login}" method="post">
                        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="mb-3">
                            <label for="username" class="form-label">Tên đăng nhập</label>
                            <input type="text" id="username" name="username" class="form-control" required autofocus>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label">Mật khẩu</label>
                            <input type="password" id="password" name="password" class="form-control" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 btn-lg">Đăng nhập</button>
                    </form>

                    <div class="text-center mt-4 d-grid gap-2">
                        <a th:href="@{/register}" class="text-decoration-none">Chưa có tài khoản? Đăng ký</a>
                        <a th:href="@{/products}" class="text-decoration-none">Xem sản phẩm</a>
                        <a th:href="@{/}" class="text-decoration-none">Quay về trang chủ</a>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>

<footer th:replace="~{layout/footer :: userFooter}"></footer>

<script th:src="@{/js/user/home.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
