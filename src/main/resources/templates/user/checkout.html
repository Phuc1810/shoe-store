<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Thanh toán - Shoe Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/user.css}">
</head>
<body class="home-page">
<header th:replace="~{layout/header :: userHeader}"></header>

<main class="checkout-page">
    <section class="container checkout-shell">
        <div class="cart-heading">
            <div>
                <h1>Thanh toán</h1>
                <p>Nhập thông tin nhận hàng và chọn phương thức thanh toán</p>
            </div>
            <a class="btn btn-outline-primary" th:href="@{/cart}">Quay lại giỏ hàng</a>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}">
            Có lỗi xảy ra
        </div>

        <form th:action="@{/checkout}" method="post" class="row g-4 align-items-start">
            <div class="col-12 col-lg-7">
                <section class="checkout-card">
                    <h2>Thông tin nhận hàng</h2>

                    <div class="mb-3">
                        <label for="receiverName" class="form-label">Tên người nhận</label>
                        <input type="text" id="receiverName" name="receiverName" class="form-control"
                               th:value="${checkoutRequest.receiverName}" required>
                    </div>

                    <div class="mb-3">
                        <label for="receiverPhone" class="form-label">Số điện thoại</label>
                        <input type="text" id="receiverPhone" name="receiverPhone" class="form-control"
                               th:value="${checkoutRequest.receiverPhone}" required>
                    </div>

                    <div class="mb-3">
                        <label for="shippingAddress" class="form-label">Địa chỉ nhận hàng</label>
                        <input type="text" id="shippingAddress" name="shippingAddress" class="form-control"
                               th:value="${checkoutRequest.shippingAddress}" required>
                    </div>

                    <div class="mb-4">
                        <label for="note" class="form-label">Ghi chú</label>
                        <textarea id="note" name="note" class="form-control" rows="3"
                                  th:text="${checkoutRequest.note}"></textarea>
                    </div>

                    <h2>Phương thức thanh toán</h2>
                    <div class="payment-method-list">
                        <label class="payment-method-option">
                            <input type="radio" name="paymentMethod" value="COD"
                                   th:checked="${checkoutRequest.paymentMethod == null || checkoutRequest.paymentMethod == 'COD'}">
                            <span>
                                <strong>COD</strong>
                                <small>Thanh toán khi nhận hàng</small>
                            </span>
                        </label>
                        <label class="payment-method-option">
                            <input type="radio" name="paymentMethod" value="BANK_QR"
                                   th:checked="${checkoutRequest.paymentMethod == 'BANK_QR'}">
                            <span>
                                <strong>BANK_QR</strong>
                                <small>Thanh toán bằng QR ngân hàng</small>
                            </span>
                        </label>
                    </div>
                </section>
            </div>

            <div class="col-12 col-lg-5">
                <aside class="checkout-card checkout-summary-card">
                    <h2>Tóm tắt đơn hàng</h2>
                    <div class="checkout-summary-items">
                        <div class="checkout-summary-item d-flex align-items-center gap-3" th:each="item : ${cart.items}">
                            <img class="checkout-summary-img flex-shrink-0"
                                 th:src="${item.imageUrl}"
                                 th:alt="${item.productName}">
                            <div class="checkout-summary-info flex-grow-1">
                                <div class="checkout-summary-name" th:text="${item.productName}">Tên sản phẩm</div>
                                <div class="checkout-summary-meta">
                                    <span th:text="${item.color}">Màu</span>
                                    <span> / </span>
                                    <span th:text="${item.size}">Size</span>
                                    <span> × </span>
                                    <span th:text="${item.quantity}">1</span>
                                </div>
                            </div>
                            <div class="checkout-summary-price text-end fw-bold"
                                 th:text="${#numbers.formatDecimal(item.subtotal, 0, 'POINT', 0, 'COMMA') + ' đ'}">
                                0 đ
                            </div>
                        </div>
                    </div>

                    <div class="cart-summary-row checkout-total-row">
                        <span>Tổng tiền</span>
                        <strong th:text="${#numbers.formatDecimal(cart.totalAmount, 0, 'POINT', 0, 'COMMA') + ' đ'}">
                            0 đ
                        </strong>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100">Đặt hàng</button>
                </aside>
            </div>
        </form>
    </section>
</main>

<footer th:replace="~{layout/footer :: userFooter}"></footer>

<script th:src="@{/js/user/home.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
