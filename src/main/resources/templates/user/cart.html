<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Giỏ hàng - Shoe Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/user.css}">
</head>
<body class="home-page">
<header th:replace="~{layout/header :: userHeader}"></header>

<main class="cart-page">
    <section class="container cart-shell">
        <div class="cart-heading">
            <div>
                <h1>Giỏ hàng</h1>
                <p>Kiểm tra sản phẩm trước khi thanh toán</p>
            </div>
            <a class="btn btn-outline-primary" th:href="@{/products}">Tiếp tục mua hàng</a>
        </div>

        <div th:if="${#lists.isEmpty(cart.items)}" class="product-empty-state">
            <h2>Giỏ hàng đang trống</h2>
            <p>Hãy chọn vài mẫu giày yêu thích rồi quay lại đây để thanh toán.</p>
            <a class="btn btn-primary" th:href="@{/products}">Tiếp tục mua hàng</a>
        </div>

        <div th:if="${!#lists.isEmpty(cart.items)}" class="row g-4 align-items-start">
            <div class="col-12 col-lg-8">
                <div class="cart-table-card">
                    <div class="table-responsive">
                        <table class="table align-middle cart-table">
                            <thead>
                            <tr>
                                <th>Sản phẩm</th>
                                <th>Đơn giá</th>
                                <th>Số lượng</th>
                                <th>Thành tiền</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="item : ${cart.items}">
                                <td>
                                    <div class="d-flex align-items-center gap-3">
                                        <img class="cart-item-image"
                                             th:src="${item.imageUrl}"
                                             th:alt="${item.productName}">
                                        <div>
                                            <div class="fw-semibold" th:text="${item.productName}">Tên sản phẩm</div>
                                            <div class="small text-muted">
                                                <span th:text="${item.color}">Màu</span>
                                                <span> / </span>
                                                <span th:text="${item.size}">Size</span>
                                            </div>
                                        </div>
                                    </div>
                                </td>
                                <td th:text="${#numbers.formatDecimal(item.unitPrice, 0, 'POINT', 0, 'COMMA') + ' đ'}">0 đ</td>
                                <td th:text="${item.quantity}">1</td>
                                <td class="fw-semibold"
                                    th:text="${#numbers.formatDecimal(item.subtotal, 0, 'POINT', 0, 'COMMA') + ' đ'}">
                                    0 đ
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-4">
                <aside class="cart-summary-card">
                    <h2>Tổng đơn hàng</h2>
                    <div class="cart-summary-row">
                        <span>Tổng tiền</span>
                        <strong th:text="${#numbers.formatDecimal(cart.totalAmount, 0, 'POINT', 0, 'COMMA') + ' đ'}">
                            0 đ
                        </strong>
                    </div>
                    <a class="btn btn-primary w-100" th:href="@{/checkout}">Thanh toán</a>
                </aside>
            </div>
        </div>
    </section>
</main>

<footer th:replace="~{layout/footer :: userFooter}"></footer>

<script th:src="@{/js/user/home.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
