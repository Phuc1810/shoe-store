<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Thông tin cá nhân - Shoe Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/user.css}">
</head>
<body class="home-page">
<header th:replace="~{layout/header :: userHeader}"></header>

<main class="order-page">
    <section class="container order-shell">
        <div class="section-heading">
            <div>
                <h1>Thông tin cá nhân</h1>
                <p>Thông tin tài khoản demo đang sử dụng trên Shoe Store.</p>
            </div>
            <div class="d-flex flex-wrap gap-2">
                <a class="btn btn-outline-primary" th:href="@{/orders}">Đơn hàng của tôi</a>
                <a class="btn btn-primary" th:href="@{/products}">Tiếp tục mua sắm</a>
            </div>
        </div>

        <section class="profile-card">
            <div class="row g-4 align-items-center">
                <div class="col-12 col-lg-4">
                    <div class="profile-avatar-panel">
                        <div class="profile-avatar">
                            <i class="bi bi-person-circle"></i>
                        </div>
                        <h2 th:text="${profile.fullName != null && !#strings.isEmpty(profile.fullName) ? profile.fullName : profile.username}">
                            Demo User
                        </h2>
                        <p th:text="${profile.roleName != null ? profile.roleName : 'USER'}">USER</p>
                    </div>
                </div>

                <div class="col-12 col-lg-8">
                    <div class="profile-info-grid">
                        <div class="profile-info-item">
                            <span>Tên đăng nhập</span>
                            <strong th:text="${profile.username}">demo-user</strong>
                        </div>
                        <div class="profile-info-item">
                            <span>Họ và tên</span>
                            <strong th:text="${profile.fullName != null ? profile.fullName : 'Chưa cập nhật'}">Nguyễn Văn A</strong>
                        </div>
                        <div class="profile-info-item">
                            <span>Email</span>
                            <strong th:text="${profile.email != null ? profile.email : 'Chưa cập nhật'}">demo@example.com</strong>
                        </div>
                        <div class="profile-info-item">
                            <span>Số điện thoại</span>
                            <strong th:text="${profile.phone != null ? profile.phone : 'Chưa cập nhật'}">0900000000</strong>
                        </div>
                        <div class="profile-info-item">
                            <span>Vai trò</span>
                            <strong th:text="${profile.roleName != null ? profile.roleName : 'Chưa xác định'}">USER</strong>
                        </div>
                        <div class="profile-info-item">
                            <span>Trạng thái</span>
                            <strong th:text="${profile.status != null ? profile.status : 'Chưa cập nhật'}">ACTIVE</strong>
                        </div>
                        <div class="profile-info-item profile-info-item-full">
                            <span>Ngày tạo tài khoản</span>
                            <strong th:text="${profile.createdAt != null ? #temporals.format(profile.createdAt, 'dd/MM/yyyy HH:mm') : 'Chưa có dữ liệu'}">
                                01/05/2026 09:00
                            </strong>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </section>
</main>

<footer th:replace="~{layout/footer :: userFooter}"></footer>

<script th:src="@{/js/user/home.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
