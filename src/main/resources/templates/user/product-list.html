<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sản phẩm - Shoe Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/user.css}">
</head>
<body class="home-page">
<header th:replace="~{layout/header :: userHeader}"></header>

<main class="product-list-page">
    <section class="container product-section">
        <div class="section-heading">
            <div>
                <h1 th:if="${#strings.isEmpty(keyword)}">Tất cả sản phẩm</h1>
                <h1 th:if="${!#strings.isEmpty(keyword)}">
                    Kết quả tìm kiếm cho: <span th:text="${keyword}">keyword</span>
                </h1>
                <p th:if="${genderLabel != null}">
                    Danh mục: <span th:text="${genderLabel}">Nam</span>
                </p>
                <p th:if="${genderLabel == null && #strings.isEmpty(keyword)}">
                    Khám phá các mẫu giày đang hoạt động tại Shoe Store
                </p>
            </div>
            <a class="btn btn-outline-primary" th:href="@{/products}">Xem tất cả sản phẩm</a>
        </div>

        <div th:if="${#lists.isEmpty(products)}" class="product-empty-state">
            <h2>Không tìm thấy sản phẩm phù hợp</h2>
            <p>Thử tìm bằng từ khóa khác hoặc xem toàn bộ sản phẩm đang có.</p>
            <a class="btn btn-primary" th:href="@{/products}">Xem tất cả sản phẩm</a>
        </div>

        <div class="row g-4" th:if="${!#lists.isEmpty(products)}">
            <div class="col-12 col-md-6 col-lg-3" th:each="product : ${products}">
                <a class="product-card-link" th:href="@{/products/{id}(id=${product.productId})}">
                    <article class="product-card">
                        <div class="product-card-media">
                            <img class="product-card-image" th:src="${product.imageUrl}" th:alt="${product.productName}">
                        </div>
                        <div class="product-card-body">
                            <h3 th:text="${product.productName}">Tên sản phẩm</h3>
                            <p>
                                <span th:text="${product.brandName}">Brand</span>
                                <span> / </span>
                                <span th:text="${product.categoryName}">Category</span>
                            </p>
                            <strong th:text="${product.price != null ? #numbers.formatDecimal(product.price, 0, 'POINT', 0, 'COMMA') + ' đ' : 'Liên hệ'}">
                                0 đ
                            </strong>
                        </div>
                    </article>
                </a>
            </div>
        </div>
    </section>
</main>

<footer th:replace="~{layout/footer :: userFooter}"></footer>

<script th:src="@{/js/user/home.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
