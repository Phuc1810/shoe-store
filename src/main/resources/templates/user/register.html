<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng ký - Shoe Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/user.css}">
</head>
<body class="home-page">
<header th:replace="~{layout/header :: userHeader}"></header>

<main class="order-page">
    <section class="container order-shell">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-7">
                <div class="checkout-card login-card">
                    <div class="text-center mb-4">
                        <h1 class="h3 fw-bold mb-2">Đăng ký tài khoản</h1>
                        <p class="text-muted mb-0">Tạo tài khoản mới để lưu giỏ hàng, đặt hàng và theo dõi đơn mua.</p>
                    </div>

                    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}">
                        Có lỗi xảy ra
                    </div>

                    <form th:action="@{/register}" th:object="${registerRequest}" method="post">
                        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="row g-3">
                            <div class="col-12 col-md-6">
                                <label for="username" class="form-label">Tên đăng nhập</label>
                                <input type="text" id="username" th:field="*{username}" class="form-control">
                                <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">
                                    Lỗi
                                </div>
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="fullName" class="form-label">Họ và tên</label>
                                <input type="text" id="fullName" th:field="*{fullName}" class="form-control">
                                <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}">
                                    Lỗi
                                </div>
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" id="email" th:field="*{email}" class="form-control">
                                <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">
                                    Lỗi
                                </div>
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="phone" class="form-label">Số điện thoại</label>
                                <input type="text" id="phone" th:field="*{phone}" class="form-control">
                                <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}">
                                    Lỗi
                                </div>
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="password" class="form-label">Mật khẩu</label>
                                <input type="password" id="password" th:field="*{password}" class="form-control">
                                <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">
                                    Lỗi
                                </div>
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="confirmPassword" class="form-label">Nhập lại mật khẩu</label>
                                <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="form-control">
                                <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}">
                                    Lỗi
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 btn-lg mt-4">Đăng ký</button>
                    </form>

                    <div class="text-center mt-4 d-grid gap-2">
                        <a th:href="@{/login}" class="text-decoration-none">Đã có tài khoản? Đăng nhập</a>
                        <a th:href="@{/}" class="text-decoration-none">Quay về trang chủ</a>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>

<footer th:replace="~{layout/footer :: userFooter}"></footer>

<script th:src="@{/js/user/home.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
