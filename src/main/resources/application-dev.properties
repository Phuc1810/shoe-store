# Cau hinh mau cho moi truong local/dev.
# Khong commit mat khau that vao file nay. Hay dung bien moi truong DB_URL, DB_USERNAME, DB_PASSWORD.
#
# Vi du:
# DB_URL=jdbc:mysql://localhost:3306/shoe_store?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh
# DB_USERNAME=root
# DB_PASSWORD=
#
# Khi chua co database, co the chay profile dev de demo giao dien/controller ma khong khoi tao datasource.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
